<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preferințe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="js/cookies.js"></script>
    <script src="js/storage.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const theme = CookieManager.get('theme') || 'light';
            document.body.classList.add(theme);
        });
    </script>

    <h1>Setări Preferințe</h1>
    <div id="success-message" class="alert-success" style="display: none;"></div>

    <form id="preferences-form">
        <div class="form-group">
            <label for="username">Nume utilizator</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
            <label for="theme">Tema</label>
            <select id="theme" name="theme">
                <option value="light">Luminos</option>
                <option value="dark">Întunecat</option>
            </select>
        </div>
        <div class="form-group">
            <label for="language">Limba</label>
            <select id="language" name="language">
                <option value="ro">Română</option>
                <option value="en">English</option>
                <option value="fr">Français</option>
            </select>
        </div>
        <div class="form-group">
            <label for="fontSize">Dimensiune font</label>
            <select id="fontSize" name="fontSize">
                <option value="14">14px</option>
                <option value="16">16px</option>
                <option value="18">18px</option>
                <option value="20">20px</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Salvează</button>
    </form>

    <nav>
        <a href="index.html">Înapoi</a>
    </nav>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Pre-populare cu valorile salvate
            document.getElementById('username').value = CookieManager.get('username') || '';
            document.getElementById('theme').value = CookieManager.get('theme') || 'light';
            document.getElementById('language').value = StorageManager.getLocal('language') || 'ro';
            document.getElementById('fontSize').value = StorageManager.getLocal('fontSize') || '16';

            document.getElementById('preferences-form').addEventListener('submit', function(e) {
                e.preventDefault();
                const username = document.getElementById('username').value;
                const theme = document.getElementById('theme').value;
                const language = document.getElementById('language').value;
                const fontSize = document.getElementById('fontSize').value;

                CookieManager.set('username', username);
                CookieManager.set('theme', theme);
                StorageManager.setLocal('language', language);
                StorageManager.setLocal('fontSize', fontSize);

                // Aplicare temă imediat
                document.body.classList.remove('light', 'dark');
                document.body.classList.add(theme);

                document.getElementById('success-message').style.display = 'block';
                document.getElementById('success-message').textContent = 'Preferințele au fost salvate cu succes!';

                setTimeout(function() {
                    window.location.href = 'index.html';
                }, 1500);
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Înregistrare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="js/cookies.js"></script>
    <script src="js/storage.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const theme = CookieManager.get('theme') || 'light';
            document.body.classList.add(theme);

            let users = StorageManager.getLocal('users');
            if (!users || !Array.isArray(users)) {
                StorageManager.setLocal('users', []);
            }
        });
    </script>

    <h1>Înregistrare</h1>
    <div id="error-message" class="alert-error" style="display: none;"></div>
    <div id="success-message" class="alert-success" style="display: none;"></div>

    <form id="register-form">
        <div class="form-group">
            <label for="username">Username (min. 3 caractere)</label>
            <input type="text" id="username" name="username" required minlength="3">
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="password">Parolă (min. 6 caractere)</label>
            <input type="password" id="password" name="password" required minlength="6">
        </div>
        <div class="form-group">
            <label for="confirmPassword">Confirmare parolă</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required>
        </div>
        <button type="submit" class="btn btn-primary">Înregistrare</button>
    </form>

    <p>Aveți deja cont? <a href="login.html">Autentificați-vă</a></p>
    <nav>
        <a href="index.html">Pagina Principală</a>
    </nav>

    <script>
        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (username.length < 3) {
                errorDiv.textContent = 'Username-ul trebuie să aibă minim 3 caractere.';
                errorDiv.style.display = 'block';
                return;
            }
            if (!isValidEmail(email)) {
                errorDiv.textContent = 'Introduceți un email valid.';
                errorDiv.style.display = 'block';
                return;
            }
            if (password.length < 6) {
                errorDiv.textContent = 'Parola trebuie să aibă minim 6 caractere.';
                errorDiv.style.display = 'block';
                return;
            }
            if (password !== confirmPassword) {
                errorDiv.textContent = 'Parolele nu coincid.';
                errorDiv.style.display = 'block';
                return;
            }

            const users = StorageManager.getLocal('users') || [];
            if (users.find(u => u.username === username)) {
                errorDiv.textContent = 'Acest username este deja folosit.';
                errorDiv.style.display = 'block';
                return;
            }
            if (users.find(u => u.email === email)) {
                errorDiv.textContent = 'Acest email este deja înregistrat.';
                errorDiv.style.display = 'block';
                return;
            }

            const maxId = users.length ? Math.max(...users.map(u => u.id)) : 0;
            const newUser = {
                id: maxId + 1,
                username: username,
                email: email,
                password: password
            };
            users.push(newUser);
            StorageManager.setLocal('users', users);

            successDiv.textContent = 'Cont creat cu succes! Veți fi redirecționat către pagina de autentificare...';
            successDiv.style.display = 'block';

            setTimeout(function() {
                window.location.href = 'login.html';
            }, 2000);
        });
    </script>
</body>
</html>
